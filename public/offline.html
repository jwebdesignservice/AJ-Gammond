<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1B4332" />
  <title>Offline — AJ Gammond</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(to bottom, #1B4332, #2D6A4F);
      color: #fff;
      text-align: center;
    }
    .box { max-width: 360px; }
    .icon {
      width: 72px; height: 72px;
      margin: 0 auto 24px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
    }
    h1 { font-size: 22px; margin-bottom: 10px; }
    p { font-size: 15px; line-height: 1.5; color: rgba(255, 255, 255, 0.85); margin-bottom: 24px; }
    button {
      background: #fff; color: #1B4332;
      border: none; border-radius: 3px;
      padding: 14px 24px; font-size: 16px; font-weight: 700;
      width: 100%; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">
      <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 1l22 22" />
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55" />
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39" />
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9" />
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88" />
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
        <line x1="12" y1="20" x2="12.01" y2="20" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>This page needs a connection. Any checklist you've already opened will still work — reconnect to load new data or submit.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
